<!-- NOVELS LIST CONTENT -->
<div class="flex flex-col lg:flex-row justify-between gap-4 mb-6">
  <input
    type="text"
    id="searchInput"
    placeholder="Зохиол хайх..."
    class="w-full lg:w-72 px-4 py-2.5 border border-slate-200 rounded-xl outline-none focus:border-red-500 text-sm"
  >
  <button onclick="goAddNovel()"
    class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-xl font-medium text-sm text-center">
    + Шинэ нэмэх
  </button>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
  <div class="admin-panel p-5">
    <p class="text-xs text-slate-400">Нийт зохиол</p>
    <p id="totalNovels" class="text-2xl font-bold mt-1">0</p>
  </div>
  <div class="admin-panel p-5">
    <p class="text-xs text-slate-400">Төрөл</p>
    <p id="totalCategories" class="text-2xl font-bold mt-1">0</p>
  </div>
  <div class="admin-panel p-5">
    <p class="text-xs text-slate-400">Нийт үзэлт</p>
    <p id="totalViews" class="text-2xl font-bold mt-1">0</p>
  </div>
</div>

<div id="list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4"></div>

<script>
(function() {
  var novels = JSON.parse(localStorage.getItem("adminNovels")) || [
    { id: 1, title: "Тулааны Бурхан Асура", category: "Тулаант", author: "Б. Эрдэнэбат", chapters: 128, views: 24560, img: "../../assets/images/covers/1.png" },
    { id: 2, title: "Харанхуйн Хаан", category: "Уран зөгнөл", author: "С. Болормаа", chapters: 87, views: 19840, img: "../../assets/images/covers/2.png" }
  ];

  var container = document.getElementById("list");
  var searchInput = document.getElementById("searchInput");

  function updateStats(data) {
    if (!data) data = novels;
    document.getElementById("totalNovels").textContent = data.length;
    document.getElementById("totalCategories").textContent = new Set(data.map(function(n) { return n.category; })).size;
    document.getElementById("totalViews").textContent = data.reduce(function(sum, n) { return sum + (n.views || 0); }, 0).toLocaleString();
  }

  function render(data) {
    if (!data) data = novels;
    container.innerHTML = "";

    if (!data.length) {
      container.innerHTML = '<div class="admin-panel p-8 text-center col-span-full"><h3 class="text-lg font-bold">Илэрц олдсонгүй</h3></div>';
      updateStats([]);
      return;
    }

    data.forEach(function(n) {
      container.innerHTML += '<div class="admin-panel overflow-hidden flex flex-col text-sm">' +
        '<div onclick="openNovel(' + n.id + ')" class="cursor-pointer">' +
          '<img src="' + n.img + '" class="w-full h-44 object-cover">' +
          '<div class="p-4">' +
            '<span class="text-xs bg-slate-100 px-2 py-1 rounded-full">' + n.category + '</span>' +
            '<h3 class="font-semibold mt-2 leading-5 min-h-[40px]">' + n.title + '</h3>' +
            '<p class="text-xs text-slate-500 mt-1">' + n.author + '</p>' +
            '<div class="flex justify-between mt-3 text-xs text-slate-600">' +
              '<span>📚 ' + n.chapters + '</span>' +
              '<span>👁 ' + Number(n.views).toLocaleString() + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="flex gap-2 px-3 pb-3 mt-auto">' +
          '<button onclick="editNovel(' + n.id + ')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-xs">Засах</button>' +
          '<button onclick="deleteNovel(' + n.id + ')" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg text-xs">Устгах</button>' +
        '</div>' +
      '</div>';
    });

    updateStats(data);
  }

  window.openNovel = function(id) {
    goAddChapter(id);
  };

  window.editNovel = function(id) {
    goEditNovel(id);
  };

  window.deleteNovel = function(id) {
    if (confirm("Устгах уу?")) {
      novels = novels.filter(function(n) { return n.id !== id; });
      localStorage.setItem("adminNovels", JSON.stringify(novels));
      render();
    }
  };

  searchInput.addEventListener("input", function() {
    var q = this.value.toLowerCase();
    var filtered = novels.filter(function(n) {
      return n.title.toLowerCase().includes(q) || n.author.toLowerCase().includes(q) || n.category.toLowerCase().includes(q);
    });
    render(filtered);
  });

  render();
})();
</script>
