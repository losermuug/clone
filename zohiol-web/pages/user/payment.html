<!-- PAYMENT CONTENT -->
<section class="user-hero">
  <div class="user-hero__overlay">
    <img src="./assets/images/covers/2.png" alt="banner" />
  </div>
  <div class="user-hero__content">
    <div class="user-hero__profile">
      <img src="./assets/images/covers/1.png" alt="Avatar" class="user-hero__avatar" />
      <div class="user-hero__meta">
        <p class="user-hero__label">Premium Access</p>
        <h1 class="user-hero__name" id="paymentHeroName">User</h1>
        <p class="user-hero__email" id="paymentHeroEmail">email@gmail.com</p>
      </div>
    </div>
    <div class="user-hero__actions">
      <button type="button" onclick="goProfile()" class="user-btn-secondary">Миний булан</button>
      <button type="button" onclick="goTransactions()" class="user-btn-primary">Гүйлгээний түүх</button>
    </div>
  </div>
</section>

<main class="user-container">
  <div class="user-layout">
    <aside class="user-sidebar">
      <div class="user-menu">
        <a href="#" onclick="goProfile()">Миний булан</a>
        <a href="#" class="active" onclick="goPayment()">Эрх сунгах</a>
        <a href="#" onclick="goTransactions()">Гүйлгээний түүх</a>
        <a href="#" onclick="goMyReading()">Сүүлд уншсан</a>
        <a href="#" onclick="goFavorites()">Дуртай зохиол</a>
        <a href="#" onclick="goUserNovels()">Зохиолууд</a>
      </div>
    </aside>

    <section class="user-main">
      <div class="user-card">
        <h2 class="user-card__title">Эрх сунгах</h2>
        <p class="payment-lead">Premium эрх идэвхжүүлж, бүх анги болон нэмэлт боломжуудыг ашиглана.</p>
      </div>

      <div class="user-card">
        <div class="payment-form-grid">
          <div class="payment-field">
            <label for="emailInput">И-мэйл</label>
            <input id="emailInput" type="email" value="dorjoo@gmail.com" placeholder="И-мэйл хаяг" />
          </div>
          <div class="payment-field">
            <label for="nameInput">Нэр</label>
            <input id="nameInput" type="text" value="Dorjoo" placeholder="Нэр" />
          </div>
        </div>

        <div class="payment-section">
          <h3 class="payment-section__title">Эрхийн багц</h3>
          <div class="payment-plans" id="plans">
            <button type="button" class="payment-plan-card active" data-name="1 сар" data-price="5000">
              <span class="payment-plan-card__badge">ЗӨВЛӨМЖ</span>
              <h4 class="payment-plan-card__title">1 сар</h4>
              <p class="payment-plan-card__desc">Эхлэхэд тохиромжтой</p>
              <div class="payment-plan-card__price">5,000₮</div>
            </button>
            <button type="button" class="payment-plan-card" data-name="3 сар" data-price="12000">
              <span class="payment-plan-card__badge">ХЭМНЭЛТТЭЙ</span>
              <h4 class="payment-plan-card__title">3 сар</h4>
              <p class="payment-plan-card__desc">Илүү ашигтай сонголт</p>
              <div class="payment-plan-card__price">12,000₮</div>
            </button>
            <button type="button" class="payment-plan-card" data-name="12 сар" data-price="40000">
              <span class="payment-plan-card__badge">ШИЛДЭГ</span>
              <h4 class="payment-plan-card__title">12 сар</h4>
              <p class="payment-plan-card__desc">Жилийн бүтэн эрх</p>
              <div class="payment-plan-card__price">40,000₮</div>
            </button>
          </div>
        </div>

        <div class="payment-summary">
          <div>
            <p class="payment-summary__label">Сонгосон багц</p>
            <p id="selectedPlan" class="payment-summary__value">1 сар</p>
          </div>
          <div>
            <p class="payment-summary__label">Төлөх дүн</p>
            <p id="selectedPrice" class="payment-summary__price">5,000₮</p>
          </div>
        </div>

        <div class="payment-actions">
          <button id="payBtn" type="button" class="user-btn-primary">Хадгалах / Төлөх</button>
          <button type="button" onclick="goTransactions()" class="user-btn-secondary">Гүйлгээний түүх харах</button>
        </div>
      </div>
    </section>
  </div>
</main>

<script>
(function() {
  var el = document.getElementById("paymentHeroName");
  if (el) el.textContent = localStorage.getItem("user") || "User";
  var emailEl = document.getElementById("paymentHeroEmail");
  if (emailEl) emailEl.textContent = localStorage.getItem("email") || "example@gmail.com";

  var plans = document.getElementById("plans");
  if (plans) {
    plans.addEventListener("click", function(e) {
      var card = e.target.closest(".payment-plan-card");
      if (!card) return;
      plans.querySelectorAll(".payment-plan-card").forEach(function(c) { c.classList.remove("active"); });
      card.classList.add("active");
      var name = card.dataset.name;
      var price = Number(card.dataset.price).toLocaleString() + "₮";
      document.getElementById("selectedPlan").textContent = name;
      document.getElementById("selectedPrice").textContent = price;
    });
  }

  var payBtn = document.getElementById("payBtn");
  if (payBtn) {
    payBtn.addEventListener("click", function() {
      var plan = document.getElementById("selectedPlan").textContent;
      var price = document.getElementById("selectedPrice").textContent;
      var txs = JSON.parse(localStorage.getItem("transactions") || "[]");
      txs.unshift({
        id: "TX" + Date.now(),
        plan: plan,
        date: new Date().toISOString().split("T")[0],
        status: "Амжилттай",
        amount: price
      });
      localStorage.setItem("transactions", JSON.stringify(txs));
      alert("Амжилттай төлөгдлөө! " + plan + " - " + price);
      goTransactions();
    });
  }
})();
</script>
