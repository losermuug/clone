<!-- NEW CHAPTERS PAGE CONTENT -->
<section class="max-w-7xl mx-auto px-6 py-12">
  <div class="mb-10">
    <h1 class="text-4xl font-bold serif">Шинэ ангиуд</h1>
    <p class="text-gray-600 mt-2">Сүүлд нэмэгдсэн зохиолын ангиуд</p>
  </div>
  <div id="latestChapters" class="space-y-4"></div>
</section>

<script>
(function() {
  const chapters = [
    { novelId:1, novelTitle:"Тулааны Бурхан Асура", chapter:128, title:"Шинэ хүч сэргэсэн нь", category:"Тулаант", date:"2026-04-28", image:"./assets/images/covers/1.png" },
    { novelId:2, novelTitle:"Харанхуйн Хаан", chapter:87, title:"Харанхуйн хаалга", category:"Уран зөгнөл", date:"2026-04-27", image:"./assets/images/covers/2.png" },
    { novelId:3, novelTitle:"Сүнсний Зам", chapter:62, title:"Нууцлаг дуудлага", category:"Адал явдал", date:"2026-04-26", image:"./assets/images/covers/3.png" },
    { novelId:4, novelTitle:"Зүрхний Дуу", chapter:94, title:"Сүүлчийн захидал", category:"Романтик", date:"2026-04-25", image:"./assets/images/covers/D.png" }
  ];
  const container = document.getElementById("latestChapters");
  chapters.forEach(item => {
    container.innerHTML += `
      <div class="bg-white rounded-3xl shadow-sm p-5 flex flex-col md:flex-row gap-5 items-start md:items-center hover:shadow-md transition">
        <img src="${item.image}" alt="${item.novelTitle}" class="w-full md:w-28 h-40 md:h-32 object-cover rounded-2xl">
        <div class="flex-1">
          <span class="inline-block bg-red-50 text-red-700 text-xs px-3 py-1 rounded-full">${item.category}</span>
          <h2 class="text-xl font-semibold mt-3">${item.novelTitle}</h2>
          <p class="text-gray-600 mt-1">${item.chapter}-р анги: ${item.title}</p>
          <p class="text-sm text-gray-400 mt-2">Нэмэгдсэн: ${item.date}</p>
        </div>
        <div class="flex gap-3">
          <a href="#" data-spa-link="detail" data-id="${item.novelId}" class="border border-gray-300 hover:bg-gray-100 px-5 py-3 rounded-2xl text-sm font-medium">Дэлгэрэнгүй</a>
          <button onclick="goRead(${item.novelId}, ${item.chapter})" class="bg-red-700 hover:bg-red-800 text-white px-5 py-3 rounded-2xl text-sm font-medium">Унших</button>
        </div>
      </div>`;
  });
})();
</script>
