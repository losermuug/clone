<!-- FAVORITES CONTENT -->
<section class="user-hero">
  <div class="user-hero__overlay">
    <img src="./assets/images/covers/2.png" alt="banner" />
  </div>
  <div class="user-hero__content">
    <div class="user-hero__profile">
      <img src="./assets/images/covers/1.png" alt="Avatar" class="user-hero__avatar" />
      <div class="user-hero__meta">
        <p class="user-hero__label">Favorite Novels</p>
        <h1 class="user-hero__name" id="favoritesHeroName">User</h1>
        <p class="user-hero__email">Дуртай зохиолуудаа эндээс хурдан нээж уншина</p>
      </div>
    </div>
    <div class="user-hero__actions">
      <button type="button" onclick="goMyReading()" class="user-btn-secondary">Сүүлд уншсан</button>
      <button type="button" onclick="goUserProfile()" class="user-btn-primary">Миний булан</button>
    </div>
  </div>
</section>

<main class="user-container">
  <div class="user-layout">
    <aside class="user-sidebar">
      <div class="user-menu">
        <a href="#" onclick="goProfile()">Миний булан</a>
        <a href="#" onclick="goPayment()">Эрх сунгах</a>
        <a href="#" onclick="goTransactions()">Гүйлгээний түүх</a>
        <a href="#" onclick="goMyReading()">Сүүлд уншсан</a>
        <a href="#" class="active" onclick="goFavorites()">Дуртай зохиол</a>
        <a href="#" onclick="goUserNovels()">Зохиолууд</a>
      </div>
    </aside>

    <section class="user-main">
      <div class="user-card">
        <div class="favorites-toolbar">
          <div>
            <h2 class="user-card__title">Дуртай зохиол</h2>
            <p class="favorites-toolbar__text">Хадгалсан зохиолуудаа эндээс удирдана</p>
          </div>
          <input id="favoritesSearchInput" type="text" placeholder="Дуртай зохиолоос хайх..." class="favorites-search" />
        </div>
      </div>
      <div id="favoritesGrid" class="favorites-grid"></div>
    </section>
  </div>
</main>

<script>
(function() {
  var el = document.getElementById("favoritesHeroName");
  if (el) el.textContent = localStorage.getItem("user") || "User";

  var favorites = [
    { id: 1, title: "Тулааны Бурхан Асура", author: "Б. Эрдэнэбат", category: "Тулаант", img: "./assets/images/covers/1.png" },
    { id: 2, title: "Харанхуйн Хаан", author: "С. Болормаа", category: "Уран зөгнөл", img: "./assets/images/covers/2.png" },
    { id: 3, title: "Сүнсний Зам", author: "Д. Наранбаатар", category: "Адал явдал", img: "./assets/images/covers/3.png" }
  ];

  var grid = document.getElementById("favoritesGrid");
  if (!grid) return;

  function render(data) {
    grid.innerHTML = "";
    data.forEach(function(n) {
      grid.innerHTML += '<div class="user-card" style="cursor:pointer;" onclick="goDetail(' + n.id + ')">' +
        '<img src="' + n.img + '" style="width:100%;height:180px;object-fit:cover;border-radius:16px;" />' +
        '<h3 style="font-weight:700;margin-top:12px;">' + n.title + '</h3>' +
        '<p style="color:#64748b;font-size:14px;">' + n.author + ' • ' + n.category + '</p>' +
      '</div>';
    });
  }

  render(favorites);

  var search = document.getElementById("favoritesSearchInput");
  if (search) {
    search.addEventListener("input", function() {
      var q = this.value.toLowerCase();
      render(favorites.filter(function(n) { return n.title.toLowerCase().includes(q) || n.author.toLowerCase().includes(q); }));
    });
  }
})();
</script>
