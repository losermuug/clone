<!-- TRANSACTIONS CONTENT -->
<section class="user-hero">
  <div class="user-hero__overlay">
    <img src="./assets/images/covers/2.png" alt="banner" />
  </div>
  <div class="user-hero__content">
    <div class="user-hero__profile">
      <img src="./assets/images/covers/1.png" class="user-hero__avatar" />
      <div class="user-hero__meta">
        <p class="user-hero__label">Transaction History</p>
        <h1 class="user-hero__name" id="txHeroName">User</h1>
        <p class="user-hero__email">Таны бүх төлбөрийн бүртгэл</p>
      </div>
    </div>
    <div class="user-hero__actions">
      <button onclick="goPayment()" class="user-btn-primary">Төлбөр хийх</button>
    </div>
  </div>
</section>

<main class="user-container">
  <div class="user-layout">
    <aside class="user-sidebar">
      <div class="user-menu">
        <a href="#" onclick="goProfile()">Миний булан</a>
        <a href="#" onclick="goPayment()">Эрх сунгах</a>
        <a href="#" class="active" onclick="goTransactions()">Гүйлгээний түүх</a>
        <a href="#" onclick="goMyReading()">Сүүлд уншсан</a>
        <a href="#" onclick="goFavorites()">Дуртай зохиол</a>
        <a href="#" onclick="goUserNovels()">Зохиолууд</a>
      </div>
    </aside>

    <section class="user-main">
      <div class="user-card">
        <h2 class="user-card__title">Гүйлгээний түүх</h2>
        <p style="color:#64748b;">Таны хийсэн бүх төлбөрийн жагсаалт</p>
      </div>

      <div class="user-card">
        <div class="transactions-table-wrapper">
          <table class="transactions-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Багц</th>
                <th>Огноо</th>
                <th>Төлөв</th>
                <th class="text-right">Дүн</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</main>

<script>
(function() {
  var el = document.getElementById("txHeroName");
  if (el) el.textContent = localStorage.getItem("user") || "User";

  var txs = JSON.parse(localStorage.getItem("transactions") || "[]");
  if (!txs.length) {
    txs = [
      { id: "TX1001", plan: "1 сар", date: "2026-04-01", status: "Амжилттай", amount: "5,000₮" },
      { id: "TX1002", plan: "3 сар", date: "2026-03-15", status: "Амжилттай", amount: "12,000₮" }
    ];
  }

  var tbody = document.getElementById("tableBody");
  if (tbody) {
    txs.forEach(function(tx) {
      tbody.innerHTML += '<tr>' +
        '<td>' + tx.id + '</td>' +
        '<td>' + tx.plan + '</td>' +
        '<td>' + tx.date + '</td>' +
        '<td><span class="px-3 py-1 rounded-full text-xs bg-green-100 text-green-700">' + tx.status + '</span></td>' +
        '<td class="text-right font-bold">' + tx.amount + '</td>' +
      '</tr>';
    });
  }
})();
</script>
