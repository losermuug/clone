<!-- NOVELS PAGE CONTENT -->
<section class="max-w-7xl mx-auto px-6 py-12">

  <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-6 mb-10">
    <div>
      <h1 class="text-4xl font-bold serif">Бүх зохиолууд</h1>
      <p class="text-gray-600 mt-2">Манай платформ дээрх бүх зохиолууд</p>
    </div>

    <select
      id="categoryFilter"
      class="border border-gray-300 rounded-2xl px-5 py-3 focus:outline-none focus:border-red-500 bg-white"
    >
      <option value="">Бүх ангилал</option>
      <option value="Тулаант">Тулаант</option>
      <option value="Уран зөгнөл">Уран зөгнөл</option>
      <option value="Адал явдал">Адал явдал</option>
      <option value="Романтик">Романтик</option>
    </select>
  </div>

  <div id="novelsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>

  <div id="emptyState" class="hidden bg-white rounded-3xl shadow-sm p-10 text-center text-gray-500">
    Илэрц олдсонгүй.
  </div>

</section>

<script>
  (function() {
    const novels = [
      {
        id: 1,
        title: "Тулааны Бурхан Асура",
        description: "Эртний хүчийг өвлөсөн залуу тулаанчийн түүх.",
        category: "Тулаант",
        image: "./assets/images/covers/1.png"
      },
      {
        id: 2,
        title: "Харанхуйн Хаан",
        description: "Харанхуйн ертөнцийг захирах домог.",
        category: "Уран зөгнөл",
        image: "./assets/images/covers/2.png"
      },
      {
        id: 3,
        title: "Сүнсний Зам",
        description: "Аялал, нууц, сорилтууд.",
        category: "Адал явдал",
        image: "./assets/images/covers/3.png"
      },
      {
        id: 4,
        title: "Зүрхний Дуу",
        description: "Хайр дурлалын уянгалаг түүх.",
        category: "Романтик",
        image: "./assets/images/covers/D.png"
      }
    ];

    const grid = document.getElementById("novelsGrid");
    const emptyState = document.getElementById("emptyState");
    const categoryFilter = document.getElementById("categoryFilter");

    function renderNovels(data) {
      grid.innerHTML = "";

      if (!data.length) {
        emptyState.classList.remove("hidden");
        return;
      }

      emptyState.classList.add("hidden");

      data.forEach((novel) => {
        grid.innerHTML += `
          <a href="#" data-spa-link="detail" data-id="${novel.id}"
             class="group bg-white rounded-3xl overflow-hidden cursor-pointer card-hover shadow-sm block">
            
            <img src="${novel.image}" 
                 class="w-full h-72 object-cover" 
                 alt="${novel.title}">

            <div class="p-6">
              <span class="text-xs bg-red-50 text-red-700 px-3 py-1 rounded-full">
                ${novel.category}
              </span>

              <h3 class="text-xl font-semibold mt-4">
                ${novel.title}
              </h3>

              <p class="text-gray-600 text-sm mt-2">
                ${novel.description}
              </p>

              <span class="mt-5 w-full bg-red-700 text-white py-3 rounded-2xl inline-flex justify-center">
                Дэлгэрэнгүй
              </span>
            </div>
          </a>
        `;
      });
    }

    categoryFilter.addEventListener("change", function () {
      const category = this.value;

      if (!category) {
        renderNovels(novels);
        return;
      }

      const filtered = novels.filter((novel) => novel.category === category);
      renderNovels(filtered);
    });

    // Check for search param
    const urlParams = new URLSearchParams(window.location.search);
    const searchKeyword = urlParams.get("search");

    if (searchKeyword) {
      const filtered = novels.filter(n =>
        n.title.toLowerCase().includes(searchKeyword.toLowerCase()) ||
        n.description.toLowerCase().includes(searchKeyword.toLowerCase())
      );
      renderNovels(filtered);
    } else {
      renderNovels(novels);
    }
  })();
</script>
