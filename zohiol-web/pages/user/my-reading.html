<!-- MY READING CONTENT -->
<section class="user-hero">
  <div class="user-hero__overlay">
    <img src="./assets/images/covers/3.png" alt="banner">
  </div>
  <div class="user-hero__content">
    <div class="user-hero__profile">
      <img src="./assets/images/covers/1.png" class="user-hero__avatar">
      <div class="user-hero__meta">
        <p class="user-hero__label">Reading Progress</p>
        <h1 class="user-hero__name" id="readingHeroName">User</h1>
        <p class="user-hero__email">Уншиж байсан зохиолуудаа үргэлжлүүлнэ</p>
      </div>
    </div>
    <div class="user-hero__actions">
      <button onclick="goFavorites()" class="user-btn-secondary">Дуртай</button>
      <button onclick="goUserProfile()" class="user-btn-primary">Миний булан</button>
    </div>
  </div>
</section>

<main class="user-container">
  <div class="user-layout">
    <aside class="user-sidebar">
      <div class="user-menu">
        <a href="#" onclick="goProfile()">Миний булан</a>
        <a href="#" onclick="goPayment()">Эрх сунгах</a>
        <a href="#" onclick="goTransactions()">Гүйлгээний түүх</a>
        <a href="#" class="active" onclick="goMyReading()">Сүүлд уншсан</a>
        <a href="#" onclick="goFavorites()">Дуртай зохиол</a>
        <a href="#" onclick="goUserNovels()">Зохиолууд</a>
      </div>
    </aside>

    <section class="user-main">
      <div class="user-card">
        <div class="flex flex-col md:flex-row md:justify-between gap-4">
          <div>
            <h2 class="user-card__title">Сүүлд уншсан</h2>
            <p class="text-gray-500 text-sm">Үргэлжлүүлэн унших боломжтой</p>
          </div>
          <div class="flex gap-3 flex-wrap">
            <input id="readingSearchInput" placeholder="Хайх..." class="border px-4 py-3 rounded-xl"/>
            <select id="readingSortSelect" class="border px-4 py-3 rounded-xl">
              <option value="default">Эрэмбэлэх</option>
              <option value="high">Их уншсан</option>
              <option value="low">Бага уншсан</option>
              <option value="name">Нэрээр</option>
            </select>
          </div>
        </div>
      </div>
      <div id="readingGrid" class="grid md:grid-cols-2 gap-6"></div>
    </section>
  </div>
</main>

<script>
(function() {
  var el = document.getElementById("readingHeroName");
  if (el) el.textContent = localStorage.getItem("user") || "User";

  var readingList = [
    {id:1, title:"Тулааны Бурхан Асура", author:"Б. Эрдэнэбат", chapter:58, progress:85, img:"./assets/images/covers/1.png"},
    {id:2, title:"Харанхуйн Хаан", author:"С. Болормаа", chapter:31, progress:45, img:"./assets/images/covers/2.png"},
    {id:3, title:"Сүнсний Зам", author:"Д. Наранбаатар", chapter:62, progress:100, img:"./assets/images/covers/3.png"},
    {id:4, title:"Зүрхний Дуу", author:"О. Сувд", chapter:19, progress:20, img:"./assets/images/covers/D.png"}
  ];

  var filtered = readingList.slice();

  function renderReading(data) {
    var grid = document.getElementById("readingGrid");
    if (!grid) return;
    grid.innerHTML = "";
    data.forEach(function(item) {
      grid.innerHTML += '<div class="user-card">' +
        '<img src="' + item.img + '" class="w-full h-56 object-cover rounded-xl">' +
        '<div class="p-4">' +
          '<h3 class="font-bold text-xl">' + item.title + '</h3>' +
          '<p class="text-gray-500">Зохиолч: ' + item.author + '</p>' +
          '<p class="text-sm mt-1">' + item.chapter + '-р анги</p>' +
          '<div class="mt-3"><div class="h-2 bg-gray-200 rounded-full"><div class="h-2 bg-red-600 rounded-full" style="width:' + item.progress + '%"></div></div>' +
          '<p class="text-sm mt-1 text-red-600">' + item.progress + '%</p></div>' +
          '<div class="mt-4 flex gap-2">' +
            '<button onclick="goRead(' + item.id + ',' + item.chapter + ')" class="user-btn-primary">Үргэлжлүүлэх</button>' +
            '<button onclick="goDetail(' + item.id + ')" class="user-btn-secondary">Дэлгэрэнгүй</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    });
  }

  function applyFilters() {
    var keyword = (document.getElementById("readingSearchInput").value || "").toLowerCase();
    var sort = (document.getElementById("readingSortSelect") || {}).value || "default";
    filtered = readingList.filter(function(item) { return item.title.toLowerCase().includes(keyword); });
    if (sort === "high") filtered.sort(function(a,b) { return b.progress - a.progress; });
    if (sort === "low") filtered.sort(function(a,b) { return a.progress - b.progress; });
    if (sort === "name") filtered.sort(function(a,b) { return a.title.localeCompare(b.title); });
    renderReading(filtered);
  }

  var searchEl = document.getElementById("readingSearchInput");
  var sortEl = document.getElementById("readingSortSelect");
  if (searchEl) searchEl.addEventListener("input", applyFilters);
  if (sortEl) sortEl.addEventListener("change", applyFilters);

  renderReading(filtered);
})();
</script>
