<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zohiol Web - Монгол Веб Зохиол</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/read.css" />
  <link rel="stylesheet" href="./css/user.css" />

  <style>
    /* SPA transition effect */
    #app {
      opacity: 1;
      transition: opacity 0.15s ease;
    }
    #app.spa-loading {
      opacity: 0;
    }

    /* Loading bar at top */
    #spa-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #b91c1c, #dc2626, #ef4444);
      z-index: 9999;
      transition: width 0.3s ease;
      width: 0%;
      opacity: 0;
    }
    #spa-progress.active {
      opacity: 1;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-800">

  <!-- SPA Progress bar -->
  <div id="spa-progress"></div>

  <!-- HEADER (loaded from user-master.html) -->
  <div id="siteHeader"></div>

  <!-- MAIN CONTENT AREA (this changes per page) -->
  <div id="app"></div>

  <!-- FOOTER (loaded from user-master.html) -->
  <div id="siteFooter"></div>

  <script>
    // Load user-master.html component (header + footer)
    fetch("./pages/user/user-master.html?v=" + Date.now())
      .then(function(res) { return res.text(); })
      .then(function(html) {
        // Fix paths: ../../ → ./ (since we're loading from root context)
        html = html.replace(/\.\.\/\.\.\//g, "./");

        var temp = document.createElement("div");
        temp.innerHTML = html;

        // Extract header + mobile menu (skip previewContent)
        var header = temp.querySelector("header");
        var mobileMenu = temp.querySelector("#mobileMenu");
        var footer = temp.querySelector("footer");

        var headerContainer = document.getElementById("siteHeader");
        if (header && headerContainer) {
          headerContainer.appendChild(header);
          if (mobileMenu) headerContainer.appendChild(mobileMenu);
        }

        var footerContainer = document.getElementById("siteFooter");
        if (footer && footerContainer) {
          footerContainer.appendChild(footer);
        }

        // Notify router that header/footer are ready
        document.dispatchEvent(new Event("masterLoaded"));
      })
      .catch(function(err) {
        console.error("Failed to load user-master.html:", err);
      });
  </script>

  <script src="./js/router.js"></script>

</body>
</html>
